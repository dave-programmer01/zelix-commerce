# --- Local dev profile ---

spring.datasource.url=jdbc:postgresql://localhost:5432/zelix_dev
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

logging.level.com.zelix=DEBUG
logging.level.org.springframework.security=DEBUG

spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT secret for local dev only - never reuse this value in prod
zelix.jwt.secret=${JWT_SECRET:dev-only-secret-change-me-please-this-is-not-secure}
