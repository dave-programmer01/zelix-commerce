# Active profile - override with --spring.profiles.active=prod at runtime
spring.profiles.active=dev

spring.application.name=zelix

spring.data.web.pageable.size-parameter=limit
spring.data.web.pageable.one-indexed-parameters=true

# Virtual threads (Java 21+) - free concurrency boost for I/O-bound endpoints
spring.threads.virtual.enabled=true

# JWT settings (shared across profiles, values can still be overridden per-profile)
zelix.jwt.access-token-expiry-minutes=15
zelix.jwt.refresh-token-expiry-days=30
