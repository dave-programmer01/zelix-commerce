# --- Production profile ---
# Every sensitive value comes from an environment variable. Nothing here
# should ever be a real secret - this file is safe to commit.

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# validate, not update - prod schema changes go through migrations, not Hibernate auto-DDL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

logging.level.com.zelix=INFO
logging.level.org.springframework.security=WARN

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}

zelix.jwt.secret=${JWT_SECRET}

# File storage (fill in once you build the upload feature)
zelix.storage.provider=${STORAGE_PROVIDER:s3}
zelix.storage.bucket=${STORAGE_BUCKET}
