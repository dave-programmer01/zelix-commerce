# --- Test profile ---
# Point this at a disposable test DB (or swap to H2 / Testcontainers later).
# Never point this at zelix_dev or any real data.

spring.datasource.url=jdbc:postgresql://localhost:5432/zelix_test
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

logging.level.com.zelix=INFO

zelix.jwt.secret=${JWT_SECRET:test-only-secret-not-for-anything-real}
